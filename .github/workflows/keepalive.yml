name: Keep backend awake

on:
  schedule:
    # Каждые 10 минут — Render free засыпает через 15 минут простоя.
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health
        run: curl -fsS --max-time 60 https://poezdka-buhgalter-backend.onrender.com/api/v1/health
